##
## Riskeez Enterprise — Nginx server config
## Copy to /etc/nginx/sites-available/riskeez and symlink to sites-enabled/
## Replace __PORT__ with the desired frontend port (default: 80)
##

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    application/javascript
    application/json
    application/x-javascript
    application/xml
    application/xml+rss
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

server {
    listen __PORT__;
    server_name _;

    root /var/www/riskeez/dist;
    index index.html;

    # Maximum upload size — allows large evidence/document uploads
    client_max_body_size 70m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API reverse proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:3001/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts — increased for AI-assisted operations
        proxy_connect_timeout  60s;
        proxy_send_timeout     120s;
        proxy_read_timeout     120s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ── Static assets with long-lived cache ──────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|otf|eot|svg|ico|webp|png|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback — all other routes serve index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # No-cache for index.html so the browser always gets the latest app shell
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Deny access to hidden files ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
